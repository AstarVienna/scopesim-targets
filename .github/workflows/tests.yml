name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  call-tests:
    name: Offline tests
    uses: AstarVienna/DevOps/.github/workflows/tests.yml@main
    secrets: inherit
    with:
      python-versions: '["3.11", "3.12", "3.13", "3.14"]'
      python-min: "3.11"  # limited versions for macOS only
      python-max: "3.14"  # limited versions for macOS only

  call-webtests:
    name: Network tests
    uses: AstarVienna/DevOps/.github/workflows/webtests.yml@main
    secrets: inherit
    with:
      python-versions: '["3.11", "3.14"]'

  call-updated-tests:
    name: Tests with updated dependencies
    uses: AstarVienna/DevOps/.github/workflows/updated_tests.yml@main
    secrets: inherit
    with:
      python-versions: '["3.11", "3.14"]'

  call-doctests:
    name: Doctests
    uses: AstarVienna/DevOps/.github/workflows/docstring_tests.yml@main
    secrets: inherit
